<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feather Framework Hub</title>
    <style>
        :root { --bg: #050505; --card: #111; --text: #eee; --accent: #4f46e5; }
        body { margin: 0; font-family: 'Inter', system-ui; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 2rem; }
        
        .container { max-width: 800px; width: 100%; }
        header { display: flex; align-items: center; gap: 1rem; margin-bottom: 3rem; }
        .feather-icon { width: 40px; height: 40px; fill: var(--accent); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; }
        .card { background: var(--card); padding: 2rem; border-radius: 16px; border: 1px solid #222; transition: 0.3s; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        
        h2 { margin-top: 0; font-size: 1.25rem; }
        p { color: #888; font-size: 0.95rem; line-height: 1.6; }
        a { color: var(--accent); text-decoration: none; font-weight: 600; margin-top: 1rem; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <svg class="feather-icon" viewBox="0 0 24 24"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5zM16 8l2 2"/></svg>
        <h1>Feather Framework</h1>
    </header>

    <div class="grid">
        <div class="card">
            <h2>Documentation</h2>
            <p>Master the framework with comprehensive guides on controllers, services, and networking.</p>
            <a href="documentation/index.html">Read Docs →</a>
        </div>
        <div class="card">
            <h2>GitHub Repository</h2>
            <p>View the source code, contribute, or report issues on the official repository.</p>
            <a href="https://github.com/nylonpixelated/feather">View Source →</a>
        </div>
    </div>
</div>

</body>
</html>
