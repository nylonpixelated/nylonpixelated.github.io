<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nylonpixelated.</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');
        
        :root { --bg: #030303; --text: #a1a1a1; --accent: #ffffff; }
        
        body, html { 
            margin: 0; padding: 0; background: var(--bg); color: var(--text); 
            font-family: 'JetBrains Mono', monospace; overflow: hidden; 
            width: 100%; height: 100%; 
        }
        
        #bg-canvas { 
            position: fixed; top: 0; left: 0; z-index: 0; 
            width: 100vw; height: 100vh; pointer-events: none; 
        }
        
        #app { 
            position: relative; z-index: 10; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; pointer-events: auto;
        }
        .container { width: 100%; max-width: 500px; padding: 2rem; text-align: center; }
        
        .header-wrapper { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 0.5rem; }
        h1 { color: var(--accent); font-size: 1.2rem; font-weight: 600; margin: 0; cursor: pointer; }
        .pfp { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #333; }
        
        .sub { font-size: 0.8rem; margin-bottom: 2rem; }
        .nav { display: flex; justify-content: center; gap: 15px; margin-bottom: 2rem; flex-wrap: wrap; }
        .tab { cursor: pointer; color: var(--text); font-size: 0.9rem; transition: 0.2s; }
        .tab:hover, .tab.active { color: var(--accent); text-decoration: underline; }
        
        .content { min-height: 250px; line-height: 1.8; text-align: left; }
        .project-item { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; color: var(--accent); }
        .svg-icon { width: 16px; height: 16px; stroke: var(--text); fill: none; vertical-align: middle; }
        
        input, textarea { width: 100%; background: #0a0a0a; border: 1px solid #222; color: white; padding: 10px; margin-bottom: 10px; font-family: inherit; border-radius: 4px; box-sizing: border-box; }
        button { background: var(--accent); color: black; border: none; padding: 8px 16px; cursor: pointer; font-family: inherit; font-weight: 600; margin-top: 5px; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="app">
        <div class="container">
            <div class="header-wrapper">
                <h1 onclick="nav('about', document.querySelectorAll('.tab')[0])">nylonpixelated.</h1>
                <img src="https://cdn.discordapp.com/avatars/1081297655516385331/a_f7a6b2c8d4e9f0a1b2c3d4e5f6a7b8c9.png" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'" alt="pfp" class="pfp">
            </div>
            <p class="sub">Engineering modular systems since 2020.</p>
            <nav class="nav">
                <div class="tab active" onclick="nav('about', this)">about</div>
                <div class="tab" onclick="nav('projects', this)">projects</div>
                <div class="tab" onclick="nav('contact', this)">contact</div>
                <div class="tab" onclick="nav('hire', this)">hire</div>
                 <div class="tab" onclick="nav('pastwork', this)">past work</div>
            </nav>
            <div id="content" class="content"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const texts = ["local Feather = {}", "task.spawn()", "require(module)", "game:GetService", "ModuleScript"];
        const pad = 100;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.text = texts[Math.floor(Math.random() * texts.length)];
                this.x = Math.random() * (canvas.width - pad * 2) + pad;
                this.y = Math.random() * (canvas.height - pad * 2) + pad;
                this.vx = (Math.random() - 0.5) * 0.3;
                this.vy = (Math.random() - 0.5) * 0.3;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < pad || this.x > canvas.width - pad) this.vx *= -1;
                if (this.y < pad || this.y > canvas.height - pad) this.vy *= -1;
            }
            draw() {
                ctx.fillStyle = '#1a1a1a'; 
                ctx.font = '14px JetBrains Mono';
                ctx.fillText(this.text, this.x, this.y);
            }
        }

        function initParticles() {
            particles = Array.from({length: 25}, () => new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        const svgs = {
            house: `<svg class="svg-icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
            feather: `<svg class="svg-icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"/><line x1="16" y1="8" x2="2" y2="22"/><line x1="17.5" y1="15" x2="9" y2="15"/></svg>`,
            discord: `<svg class="svg-icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.579.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.093-.775-9.52-3.444-13.659a.066.066 0 0 0-.033-.027z"/></svg>`,
            github: `<svg class="svg-icon" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>`
        };

        const pages = {
            about: `<p>backend programmer.<br>community management.<br>always pushing past the limitations.</p>`,
            pastwork:  `<p>Ruh roh! You ran into a unfinished part of this github!</p>
            <div class="project-item">${svgs.github} nylonpixelated</div>
            `,
            projects: `
                <div class="project-item">${svgs.house} slime-tower-defense</div>
                <div class="project-item">${svgs.feather} feather-framework</div>
                <div class="project-item">${svgs.house} feed-a-dragon</div>
            `,
            contact: `
                <p>reach out anytime.</p>
                <div class="project-item">${svgs.discord} .c_ade</div>
                <div class="project-item">${svgs.github} nylonpixelated</div>
            `,
            hire: `
                <p>Let's work together.</p>
                <form onsubmit="event.preventDefault(); window.location.href='mailto:gamingmaavis@gmail.com?subject=Hire Me';">
                    <input type="text" placeholder="your name" required>
                    <textarea name="msg" placeholder="project details..." rows="3" required></textarea>
                    <button type="submit">send email</button>
                </form>
            `
        };

        function nav(id, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('content').innerHTML = pages[id];
        }

        window.onload = () => {
            initParticles();
            animate();
            nav('about', document.querySelectorAll('.tab')[0]);
        };
    </script>
</body>
</html>
