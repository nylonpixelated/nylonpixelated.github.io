<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nylonpixelated.</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');
        
        :root { 
            --bg: #030303; 
            --text: #a1a1a1; 
            --accent: #ffffff; 
        }
        
        body { 
            margin: 0; 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'JetBrains Mono', monospace; 
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #bg-canvas { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            z-index: -1; 
        }

        .main { 
            text-align: center; 
            z-index: 10;
            padding: 20px;
        }
        
        h1 { color: var(--accent); font-size: 1.2rem; font-weight: 600; margin-bottom: 2rem; }
        .nav { display: flex; gap: 20px; justify-content: center; margin-bottom: 3rem; }
        .tab { cursor: pointer; color: var(--text); font-size: 0.9rem; transition: 0.2s; }
        .tab:hover, .tab.active { color: var(--accent); text-decoration: underline; }
        .content { min-height: 200px; line-height: 1.6; max-width: 500px; }
        .avatar { width: 60px; height: 60px; border-radius: 50%; margin-bottom: 1.5rem; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="main">
        <h1>nylonpixelated.</h1>
        <nav class="nav">
            <div class="tab active" onclick="nav('about', this)">about</div>
            <div class="tab" onclick="nav('projects', this)">projects</div>
            <div class="tab" onclick="nav('contact', this)">contact</div>
        </nav>
        <div id="content" class="content"></div>
    </div>

    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        const mouse = { x: -1000, y: -1000 };
        let width, height;

        // Custom resize engine
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', (e) => { 
            mouse.x = e.clientX; 
            mouse.y = e.clientY; 
        });
        resize();

        class Snippet {
            constructor(text) {
                this.text = text;
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Bounce logic with 100px padding
                const pad = 100;
                if (this.x < pad || this.x > width - pad) this.vx *= -1;
                if (this.y < pad || this.y > height - pad) this.vy *= -1;

                // Mouse Repel
                const dx = this.x - mouse.x;
                const dy = this.y - mouse.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 150) {
                    this.x += dx * 0.05;
                    this.y += dy * 0.05;
                }
            }

            draw() {
                ctx.fillStyle = '#333333'; // High visibility gray
                ctx.font = '14px JetBrains Mono';
                ctx.fillText(this.text, this.x, this.y);
            }
        }

        const snippets = ["local Feather = {}", "task.spawn()", "require(Module)", "game:GetService", "ModuleScript", "local player = nil"];
        const particles = snippets.map(t => new Snippet(t));

        function animate() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        window.onload = animate;

        const content = {
            about: `<img src="https://cdn.discordapp.com/avatars/1081297655516385331/cd8edc05ba9c5f59e3ce3ca7ad74cc84.png" class="avatar"><p>backend programmer.<br>building modular systems since 2020.<br>specializing in feather framework.</p>`,
            projects: `<p>> feather-framework<br>> slime-tower-defense<br>> feed-a-dragon</p>`,
            contact: `<p>discord: .c_ade<br>roblox: toymegalodon<br>email: gamingmaavis@gmail.com</p>`
        };

        function nav(id, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('content').innerHTML = content[id];
        }
        nav('about', document.querySelector('.tab'));
    </script>
</body>
</html>
