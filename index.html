<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>nylonpixelated.</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@300;500&display=swap');
        
        :root { --bg: #050505; --text: #ededed; --accent: #ffffff; }
        
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: 'Geist', sans-serif; overflow: hidden;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }

        #canvas { position: fixed; inset: 0; z-index: -1; }

        .wrapper { 
            text-align: center; z-index: 10; 
            backdrop-filter: blur(10px); padding: 40px; border-radius: 20px;
        }

        .nav { display: flex; gap: 20px; justify-content: center; margin-bottom: 20px; }
        .nav a { color: #666; text-decoration: none; font-size: 14px; transition: 0.3s; }
        .nav a:hover { color: var(--accent); }

        h1 { font-weight: 300; font-size: 2rem; margin: 0; }
        p { color: #888; font-size: 14px; max-width: 300px; margin: 10px auto; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="wrapper">
        <h1>nylonpixelated.</h1>
        <div class="nav">
            <a href="#" onclick="update('about')">about</a>
            <a href="#" onclick="update('projects')">projects</a>
            <a href="#" onclick="update('contact')">contact</a>
        </div>
        <div id="content">
            <p>Back-end Programmer. Modular systems & high-performance architecture.</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let snippets = ["task.spawn()", "local Feather = {}", "require(Module)", "service.Physics"];
        let particles = snippets.map(text => ({
            text, x: Math.random()*window.innerWidth, y: Math.random()*window.innerHeight,
            vx: (Math.random()-0.5)*2, vy: (Math.random()-0.5)*2
        }));

        function animate() {
            ctx.fillStyle = '#050505'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#111'; ctx.font = '16px monospace';
            
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
                ctx.fillText(p.text, p.x, p.y);
            });
            requestAnimationFrame(animate);
        }

        function update(section) {
            const content = {
                about: "<p>Engineering modular Roblox systems since 2020.</p>",
                projects: "<p>Feather Framework & Slime Tower Defense.</p>",
                contact: "<p>Discord: .c_ade | Roblox: toymegalodon</p>"
            };
            document.getElementById('content').innerHTML = content[section] || content.about;
        }

        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        animate();
    </script>
</body>
</html>
