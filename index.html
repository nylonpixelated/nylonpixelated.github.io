<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>nylonpixelated.</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root { --bg: #030303; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; }
        #matter-container { position: fixed; inset: 0; z-index: -1; }
        
        .container { width: min(90%, 900px); margin: 60px auto; pointer-events: none; }
        .nav { pointer-events: auto; display: flex; gap: 20px; margin-bottom: 40px; }
        .tab { cursor: pointer; color: #777; transition: 0.3s; }
        .tab:hover { color: #fff; }
        
        .content { pointer-events: auto; background: var(--glass); padding: 40px; border-radius: 32px; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div id="matter-container"></div>
    
    <div class="container">
        <nav class="nav">
            <div class="tab" onclick="show('about')">about</div>
            <div class="tab" onclick="show('projects')">projects</div>
            <div class="tab" onclick="show('games')">games</div>
        </nav>
        
        <div id="content" class="content">
            <!-- Content injected here -->
        </div>
    </div>

    <script>
        // matter.js
        const { Engine, Render, World, Bodies, Mouse, MouseConstraint } = Matter;
        const engine = Engine.create();
        const render = Render.create({ element: document.getElementById('matter-container'), engine: engine, options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: '#030303' }});
        
        // lua snippets thingy
        for(let i=0; i<10; i++) {
            World.add(engine.world, Bodies.rectangle(Math.random()*800, 0, 100, 30, { render: { fillStyle: '#1a1a1a' }}));
        }
        
        const mouse = Mouse.create(render.canvas);
        World.add(engine.world, MouseConstraint.create(engine, { mouse: mouse }));
        Engine.run(engine); Render.run(render);

        // discord api sync thingy
        const discordId = "1081297655516385331";
        const avatarUrl = `https://cdn.discordapp.com/avatars/${discordId}/cd8edc05ba9c5f59e3ce3ca7ad74cc84.png?size=512`;

        const data = {
            about: `<h1>About</h1><img src="${avatarUrl}" style="width:100px; border-radius:20px;"><p>Modular Roblox architecture since 2020.</p>`,
            projects: `<h1>Projects</h1><p>Feather Framework: Modular architecture.</p>`,
            games: `<h1>Games</h1><p>Slime Tower Defense & Feed a Dragon.</p>`
        };

        function show(tab) { document.getElementById('content').innerHTML = data[tab]; }
        show('about'); // Default
    </script>
</body>
</html>
