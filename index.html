<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>nylonpixelated.</title>
    <style>
        :root {
            --bg: #030303; --glass: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.1); --text: #fff; --muted: #777;
        }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }
        #interactive-bg { position: fixed; inset: 0; z-index: -1; }
        .container { max-width: 900px; margin: 0 auto; padding: 60px 40px; }

        /* Navigation */
        nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 80px; }
        .nav-links a { color: var(--muted); cursor: pointer; font-size: 13px; margin-left: 25px; transition: 0.3s; text-decoration: none; }
        .nav-links a:hover { color: #fff; }
        .hire-btn { border: 1px solid var(--text); padding: 8px 20px; border-radius: 20px; font-size: 12px; cursor: pointer; background: transparent; color: white; transition: 0.3s; }
        .hire-btn:hover { background: #fff; color: #000; }

        /* Grid & Components */
        .section { position: absolute; width: 100%; max-width: 900px; opacity: 0; pointer-events: none; transform: translateY(20px); transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .section.active { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .bento { background: var(--glass); border: 1px solid var(--border); border-radius: 32px; padding: 30px; backdrop-filter: blur(20px); transition: 0.3s; display: flex; flex-direction: column; }
        .bento:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.07); }
        
        .span-1 { grid-column: span 1; }
        .span-3 { grid-column: span 3; }
        .span-4 { grid-column: span 4; }
        .avatar-img { width: 100%; height: 100%; border-radius: 24px; object-fit: cover; }
        .label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>
    <canvas id="interactive-bg"></canvas>

    <div class="container">
        <nav>
            <div style="font-weight: 800; font-size: 20px;">NYLONPIXELATED</div>
            <div class="nav-links">
                <a onclick="switchSection('about')">ABOUT</a>
                <a onclick="switchSection('projects')">PROJECTS</a>
                <a onclick="switchSection('experiences')">EXPERIENCES</a>
                <a onclick="switchSection('contact')">CONTACT</a>
                <button class="hire-btn" onclick="window.location.href='mailto:gamingmaavis@gmail.com'">HIRE ME</button>
            </div>
        </nav>

        <div id="section-wrapper">
            <section id="about" class="section active">
                <div class="grid">
                    <!-- Left: Avatar Card -->
                    <div class="bento span-1" style="justify-content: center; align-items: center;">
                        <img src="https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=1998926676&size=420x420&format=Png" alt="toymegalodon" class="avatar-img">
                    </div>
                    <!-- Right: Identity Content -->
                    <div class="bento span-3">
                        <span class="label">Identity</span>
                        <h1>System Architect & Developer</h1>
                        <p style="color: var(--muted)">Engineering modular, high-performance Roblox systems. Featherweight design, heavyweight impact.</p>
                    </div>
                </div>
            </section>
            
            <!-- Other Sections omitted for brevity but follow the same structure -->
        </div>
    </div>

    <script>
        function switchSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        // ... (Canvas Logic remains the same)
    </script>
</body>
</html>
