<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        :root { --bg: #050505; --text: #ffffff; --muted: #444; --accent: #fff; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 40px; }
        
        /* Navigation (Feather-Style) */
        nav { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #111; padding-bottom: 30px; }
        .nav-links { display: flex; gap: 30px; }
        .nav-links a { color: var(--muted); text-decoration: none; font-size: 14px; transition: 0.3s; }
        .nav-links a:hover { color: var(--text); }
        
        /* Hire Me Button */
        .hire-btn { border: 1px solid #fff; padding: 8px 20px; border-radius: 20px; font-size: 12px; cursor: pointer; background: transparent; color: white; transition: 0.3s; }
        .hire-btn:hover { background: #fff; color: #000; }
        
        /* Hero Section */
        .hero { padding: 100px 0; max-width: 800px; }
        .status-pill { border: 1px solid #222; padding: 6px 16px; border-radius: 20px; font-size: 12px; margin-bottom: 20px; display: inline-block; color: #888; }
        h1 { font-size: 80px; letter-spacing: -4px; font-weight: 500; margin: 0; line-height: 0.9; }
        
        /* Project Modules */
        .project-list { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 100px; }
        .project-item { border-top: 1px solid #111; padding-top: 20px; }
        .meta { font-size: 12px; color: var(--muted); text-transform: uppercase; }
    </style>
</head>
<body>
    <nav>
        <div style="font-weight: bold;">NYLONPIXELATED</div>
        <div class="nav-links">
            <a href="#about">ABOUT</a>
            <a href="#projects">PROJECTS</a>
            <a href="#contact">CONTACT</a>
        </div>
        <button class="hire-btn" onclick="window.location.href='#contact'">HIRE ME</button>
    </nav>

    <div class="hero">
        <div class="status-pill">● ARCHITECTING FEATHER FRAMEWORK</div>
        <h1>NYLON PIXELATED.</h1>
        <p style="color: #666; margin-top: 20px;">System Architect & Roblox Developer.</p>
    </div>

    <section id="projects" class="project-list">
        <div class="project-item">
            <div class="meta">001 // FRAMEWORK</div>
            <h3>Feather</h3>
        </div>
        <div class="project-item">
            <div class="meta">002 // EXPERIENCE</div>
            <h3>Feed a Dragon</h3>
        </div>
        <div class="project-item">
            <div class="meta">003 // EXPERIENCE</div>
            <h3>Slime Tower Defense</h3>
        </div>
    </section>
</body>
</html>
