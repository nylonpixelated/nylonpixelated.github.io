<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nylonpixelated.</title>
    <style>
        :root { --bg: #030303; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.08); }
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', system-ui, sans-serif; }
        
        .container { width: min(90%, 1000px); margin: 0 auto; padding: 40px 0; }
        
        /* Bento Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .bento { 
            background: var(--glass); border: 1px solid var(--border); border-radius: 24px; 
            padding: 30px; backdrop-filter: blur(10px); transition: transform 0.3s ease; 
        }
        .bento:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.2); }
        
        /* Typography */
        h1 { font-size: clamp(2rem, 5vw, 3.5rem); margin: 0; }
        .label { font-size: 0.7rem; color: #777; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="container">
        <nav style="display: flex; justify-content: space-between; margin-bottom: 80px;">
            <div style="font-weight: 800; font-size: 1.5rem;">nylonpixelated.</div>
        </nav>

        <section id="portfolio-grid" class="grid"></section>
    </div>

    <script>
        // Data-driven content: Easy to add new games/projects here
        const projects = [
            { label: "Architecture", title: "Feather Framework", desc: "Modular, high-performance Roblox system." },
            { label: "Owner", title: "Slime Tower Defense", desc: "Systems design & custom 3D modeling." },
            { label: "Lead Dev", title: "Feed a Dragon", desc: "Backend programming and systems logic." }
        ];

        const grid = document.getElementById('portfolio-grid');
        projects.forEach(p => {
            grid.innerHTML += `
                <div class="bento">
                    <span class="label">${p.label}</span>
                    <h3>${p.title}</h3>
                    <p style="color: #888;">${p.desc}</p>
                </div>
            `;
        });
    </script>
</body>
</html>
